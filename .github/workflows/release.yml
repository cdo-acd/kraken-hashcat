name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. 7.1.2-ubuntu22)'
        required: true
        default: '7.1.2-ubuntu22'

jobs:
  build-and-release:
    name: Build and publish
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang make python3

      - name: Build (static)
        env:
          TERM: xterm
        run: make PRODUCTION=1 SHARED=0 ENABLE_LTO=0 CC=clang CXX=clang++

      - name: Package runtime files
        run: |
          mkdir -p dist
          cp hashcat dist/
          cp hashcat.hcstat2 dist/
          cp -r modules dist/
          cp -r OpenCL dist/
          [ -d bridges ] && cp -r bridges dist/ || true
          [ -d feeds   ] && cp -r feeds   dist/ || true

          # Generic tarball — works on any supported CUDA arch
          tar -czf Hashcat-linux-x86_64.tar.gz -C dist .

          # Per-arch tarballs are all the same binary today.
          # The slot exists so a dedicated build can be dropped in later
          # without changing anything in AutoAPI's _install_hashcat logic.
          #
          # Arch reference (as reported by nvidia-smi --query-gpu=compute_cap):
          #   sm70  = Volta      (V100, Titan V)
          #   sm75  = Turing     (RTX 2080 Ti, T4)
          #   sm80  = Ampere     (A100, A30)
          #   sm86  = Ampere     (RTX 3090, A40, A6000)
          #   sm89  = Ada        (RTX 4090, L40S, L4)
          #   sm90  = Hopper     (H100, H200)
          #   sm100 = Blackwell  data center (B100, B200, GB100)
          #   sm120 = Blackwell  consumer (RTX 5090, RTX 5080, ...)
          for arch in sm70 sm75 sm80 sm86 sm89 sm90 sm100 sm120; do
            cp Hashcat-linux-x86_64.tar.gz Hashcat-linux-x86_64-${arch}.tar.gz
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: hashcat ${{ github.event.inputs.release_tag }}
          body: |
            hashcat ${{ github.event.inputs.release_tag }} — built on Ubuntu 22.04 (static, clang).

            All `Hashcat-linux-x86_64-sm{arch}.tar.gz` assets are currently identical.
            The same binary works across all supported CUDA architectures via JIT kernel
            compilation. The per-arch slots allow dedicated builds to be dropped in later
            without changing client-side logic.

            **Contents:** `hashcat`, `hashcat.hcstat2`, `modules/`, `OpenCL/`, `bridges/`, `feeds/`
          files: |
            Hashcat-linux-x86_64.tar.gz
            Hashcat-linux-x86_64-sm70.tar.gz
            Hashcat-linux-x86_64-sm75.tar.gz
            Hashcat-linux-x86_64-sm80.tar.gz
            Hashcat-linux-x86_64-sm86.tar.gz
            Hashcat-linux-x86_64-sm89.tar.gz
            Hashcat-linux-x86_64-sm90.tar.gz
            Hashcat-linux-x86_64-sm100.tar.gz
            Hashcat-linux-x86_64-sm120.tar.gz
